<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>व्हेरिफिकेशन डॅशबोर्ड - अनिक फायनान्शियल सर्व्हिसेस</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff; --primary-rgb: 0, 123, 255; --primary-dark: #0056b3;
            --success-color: #28a745; --success-rgb: 40, 167, 69;
            --danger-color: #dc3545; --danger-rgb: 220, 53, 69;
            --warning-color: #ffc107; --warning-rgb: 255, 193, 7;
            --info-color: #17a2b8;
            
            --light-bg: #f4f7f6; --white-color: #ffffff;
            --dark-text: #2c3e50; --light-text: #6c757d; --border-color: #e0e6ed;
            
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
            --card-shadow-hover: 0 8px 20px rgba(0,0,0,0.08);
            --border-radius-md: 8px; --border-radius-lg: 12px;
            --transition-speed: 0.25s ease-in-out;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; 
            background-color: var(--light-bg); margin: 0; color: var(--dark-text);
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--primary-rgb), 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(var(--primary-rgb), 0.6); }

        /* Full Page Loader */
        #full-page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.4s ease; backdrop-filter: blur(5px); }
        .loader-spinner { border: 4px solid rgba(var(--primary-rgb), 0.1); border-top: 4px solid var(--primary-color); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
        #full-page-loader p { font-weight: 600; margin-top: 20px; font-size: 1.1rem; color: var(--dark-text); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #full-page-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .dashboard-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
        /* Top Bar & KPI Cards */
        .top-bar { background-color: var(--white-color); padding: 12px 20px; border-bottom: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.02); z-index: 100;}
        .top-bar-header h1 { margin: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 12px; font-weight: 700; color: #1e2a38; }
        .top-bar-header img { height: 32px; }
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 12px; }
        .kpi-card { 
            background-color: var(--white-color); border-radius: var(--border-radius-lg); 
            padding: 12px 15px; 
            transition: transform var(--transition-speed), box-shadow var(--transition-speed); 
            cursor: pointer; display: flex; align-items: center; gap: 15px; 
            border: 1px solid var(--border-color); position: relative; overflow: hidden; 
        }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background-color: var(--color); }
        .kpi-card:active { transform: scale(0.98); }
        .kpi-icon { 
            font-size: 1.3rem; width: 40px; height: 40px; border-radius: 50%; 
            display: grid; place-items: center; color: var(--white-color); flex-shrink: 0; 
        }
        #kpi-total { --color: var(--primary-color); } #kpi-pending { --color: var(--warning-color); } #kpi-approved { --color: var(--success-color); } #kpi-rejected { --color: var(--danger-color); }
        #kpi-total .kpi-icon { background: linear-gradient(135deg, #007bff, #0056b3); } #kpi-pending .kpi-icon { background: linear-gradient(135deg, #ffc107, #e0a800); } #kpi-approved .kpi-icon { background: linear-gradient(135deg, #28a745, #1e7e34); } #kpi-rejected .kpi-icon { background: linear-gradient(135deg, #dc3545, #b02a37); }
        .kpi-content h3 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        .kpi-content p { margin: 0; color: var(--light-text); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
        #kpi-total h3 { color: var(--primary-dark); } #kpi-pending h3 { color: #e0a800; } #kpi-approved h3 { color: var(--success-color); } #kpi-rejected h3 { color: var(--danger-color); }

        /* Main Layout & Sidebar */
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        .applicant-sidebar { width: 350px; background-color: var(--white-color); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 10; }
        
        /* Sidebar Filters */
        .sidebar-filters { padding: 15px; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background-color: #fcfdff; overflow-y: auto; max-height: 40%;}
        .filter-group.full-width { grid-column: 1 / -1; }
        .sidebar-filters input, .sidebar-filters select { width: 100%; padding: 10px 12px; border-radius: var(--border-radius-md); border: 1px solid var(--border-color); font-size: 0.9rem; transition: border-color var(--transition-speed); }
        .sidebar-filters input:focus, .sidebar-filters select:focus { border-color: var(--primary-color); outline: none; }
        .date-filter-label { font-size: 0.8rem; font-weight: 600; color: var(--dark-text); margin-bottom: 4px; display: block; }

        .applicant-list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .applicant-item { display: flex; flex-direction: column; gap: 6px; padding: 12px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background-color 0.2s; position: relative; }
        .applicant-item:hover { background-color: #f8faff; }
        .applicant-item.active { background-color: rgba(var(--primary-rgb), 0.05); }
        .applicant-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background-color: var(--primary-color); }
        .applicant-info h4 { margin: 0; font-size: 1rem; font-weight: 600; color: var(--dark-text); }
        .applicant-info p { margin: 4px 0 0; font-size: 0.8rem; color: var(--light-text); }
        .status-pill { padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
        .status-pill.Approved { background-color: rgba(var(--success-rgb), 0.1); color: var(--success-color); border: 1px solid rgba(var(--success-rgb), 0.2); } .status-pill.Rejected { background-color: rgba(var(--danger-rgb), 0.1); color: var(--danger-color); border: 1px solid rgba(var(--danger-rgb), 0.2); } .status-pill.Pending { background-color: rgba(var(--warning-rgb), 0.15); color: #b07d03; border: 1px solid rgba(var(--warning-rgb), 0.2); }
        .verification-summary { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; font-size: 0.75rem; color: var(--light-text); margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0e0e0; }
        .summary-item { display: flex; align-items: center; gap: 4px; font-weight: 500; }
        .summary-item .fa-check-circle { color: var(--success-color); } .summary-item .fa-times-circle { color: var(--danger-color); }

        /* Details Panel */
        .details-panel { flex: 1; padding: 20px; overflow-y: auto; background-color: var(--light-bg); -webkit-overflow-scrolling: touch; }
        #welcome-message { text-align: center; padding-top: 20vh; color: var(--light-text); opacity: 0.7; }
        .details-view-card { background-color: var(--white-color); border-radius: var(--border-radius-lg); box-shadow: var(--card-shadow); overflow: hidden; margin-bottom: 20px;}
        
        .details-header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border-color); background: linear-gradient(to right, #ffffff, #f8faff); 
            flex-wrap: wrap; gap: 15px;
        }
        .details-header .header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 250px;}
        
        #back-to-list-btn {
            display: none; background: #f0f2f5; border: 1px solid var(--border-color); color: var(--dark-text); 
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1rem; place-items: center;
        }

        /* WhatsApp Copy Box Styling */
        .whatsapp-copy-tool { padding: 15px 20px; background-color: #f0fdf4; border-bottom: 1px solid var(--border-color); }
        .whatsapp-link-box-container { border: 1px solid #bbf7d0; border-radius: var(--border-radius-md); background-color: var(--white-color); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .whatsapp-link-box-container h4 { margin: 0; font-size: 1rem; color: #166534; font-weight: 600; }
        #jitsi-link-display { padding: 8px 12px; border: 1px dashed #ccc; border-radius: 6px; font-size: 0.85rem; background-color: #f8fafc; overflow-x: auto; white-space: nowrap; }
        #copy-whatsapp-btn { background-color: #25d366; color: white; padding: 8px 15px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; align-self: flex-start; }

        .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .action-button { padding: 8px 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: transform 0.2s; white-space: nowrap; }
        .call-button { background-color: var(--success-color); color: white; box-shadow: 0 4px 10px rgba(var(--success-rgb), 0.2); }
        
        .details-header .loan-amount { font-size: 1.1rem; font-weight: 600; color: var(--light-text); }
        .details-header .loan-amounts { text-align: right; display: flex; flex-direction: column; gap: 2px; }
        .details-header .loan-amount-requested { font-size: 0.85rem; color: var(--light-text); font-weight: 500; }
        .details-header .loan-amount-approved { font-size: 1.2rem; font-weight: 700;}

        /* Tabs */
        .tabs-container { overflow-x: auto; white-space: nowrap; background-color: var(--white-color); border-bottom: 1px solid var(--border-color); -webkit-overflow-scrolling: touch; }
        .tabs { display: flex; padding: 0 10px; }
        .tab-button { padding: 12px 18px; border: none; background: transparent; cursor: pointer; font-size: 0.95rem; font-weight: 600; color: var(--light-text); border-bottom: 3px solid transparent; display: inline-flex; align-items: center; gap: 6px; }
        .tab-button.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content.active { display: block; }
        .tab-content h3 { font-size: 1.2rem; margin: 0 0 20px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; display: flex; align-items: center; gap: 8px; color: var(--primary-dark); }
        
        /* Info Grids */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .info-group { display: flex; align-items: flex-start; gap: 12px; background: #fff; padding: 12px; border-radius: var(--border-radius-md); border: 1px solid var(--border-color); border-left: 4px solid var(--primary-color); }
        .info-group i { color: var(--primary-color); font-size: 1.1rem; margin-top: 3px; }
        .info-group label { font-weight: 600; color: var(--light-text); font-size: 0.8rem; margin-bottom: 2px; display: block; }
        .info-group p { margin: 0; color: var(--dark-text); font-weight: 500; font-size: 0.95rem; word-break: break-word;}
        
        /* Galleries */
        .map-container img { max-width: 100%; border-radius: var(--border-radius-md); border: 1px solid var(--border-color); }
        .photo-gallery, .document-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        .photo-link-item { display: block; border-radius: var(--border-radius-md); overflow: hidden; background-color: #f8fafc; border: 1px solid var(--border-color); text-decoration: none; }
        .photo-link-item .photo-placeholder { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100px; color: var(--dark-text); font-weight: 600; font-size: 0.85rem;}
        .photo-link-item i { font-size: 2rem; color: var(--primary-color); margin-bottom: 8px; }
        
        /* Verification Form Styling */
        .verification-section { border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: 20px; margin-bottom: 20px; background-color: var(--white-color); }
        .verification-section h4 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--primary-dark); }
        
        /* Manager Section Special Styling */
        .manager-review-section { background: linear-gradient(145deg, #f0f8ff, #f8fcff); border-left: 5px solid var(--info-color); border-radius: var(--border-radius-md); box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .manager-review-section h4 { color: #0c5460; border-bottom-color: #bee5eb; }
        
        .verification-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: var(--dark-text); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border-radius: var(--border-radius-md); border: 1px solid #ced4da; font-size: 0.95rem; background-color: #fff; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 2px rgba(var(--primary-rgb), 0.1); }
        
        /* Select styling matching screenshot */
        select option { padding: 10px; }
        
        .form-actions { text-align: right; margin-top: 15px; }
        .form-actions button { background: var(--primary-color); color: white; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background 0.2s; }
        .form-actions button:hover { background: var(--primary-dark); }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .details-header { flex-direction: column; align-items: flex-start; }
            .details-header .loan-amounts { text-align: left; }
            .verification-grid { grid-template-columns: 1fr; } /* Stack form fields on smaller screens */
        }

        @media (max-width: 768px) { 
            .top-bar { padding: 10px 15px; } 
            .top-bar-header h1 { font-size: 1.2rem; }
            .sidebar-filters { grid-template-columns: 1fr; max-height: 150px;} 
            .main-layout { overflow-x: hidden; } 
            .applicant-sidebar { position: absolute; width: 100%; height: 100%; transform: translateX(0); z-index: 10; border-right: none;} 
            
            /* Sliding Panel Logic */
            .details-panel { position: absolute; width: 100%; height: 100%; padding: 10px; transform: translateX(100%); transition: transform 0.3s ease; z-index: 20; background: var(--light-bg); } 
            .main-layout.mobile-details-active .applicant-sidebar { transform: translateX(-30%); opacity: 0.5; pointer-events: none;} 
            .main-layout.mobile-details-active .details-panel { transform: translateX(0); } 
            
            #back-to-list-btn { display: grid; } 
            .tab-button { padding: 10px 12px; font-size: 0.9rem; }
            .info-grid { grid-template-columns: 1fr; }
            
            #welcome-message { display: none !important; } /* Hide welcome on mobile */
        }
    </style>
</head>

<div id="full-page-loader"><div class="loader-spinner"></div><p>डॅशबोर्ड लोड होत आहे...</p></div>

<div class="dashboard-container">
    <header class="top-bar">
        <div class="top-bar-header"><h1><img src="https://anikfin.com/wp-content/uploads/2024/06/anik-horizontal-1-1024x400.png" alt="Logo"> व्हेरिफिकेशन डॅशबोर्ड</h1></div>
        <div class="kpi-container">
            <div class="kpi-card" id="kpi-total"><div class="kpi-icon"><i class="fas fa-file-invoice"></i></div><div class="kpi-content"><h3 id="total-count">0</h3><p>एकूण अर्ज</p></div></div>
            <div class="kpi-card" id="kpi-pending"><div class="kpi-icon"><i class="fas fa-hourglass-half"></i></div><div class="kpi-content"><h3 id="pending-count">0</h3><p>प्रलंबित</p></div></div>
            <div class="kpi-card" id="kpi-approved"><div class="kpi-icon"><i class="fas fa-check-double"></i></div><div class="kpi-content"><h3 id="approved-count">0</h3><p>मंजूर</p></div></div>
            <div class="kpi-card" id="kpi-rejected"><div class="kpi-icon"><i class="fas fa-times-circle"></i></div><div class="kpi-content"><h3 id="rejected-count">0</h3><p>नामंजूर</p></div></div>
        </div>
    </header>

    <div class="main-layout" id="main-layout">
        <aside class="applicant-sidebar">
            <div class="sidebar-filters">
                <div class="filter-group full-width"><input type="text" id="search-box" placeholder="नाव किंवा गाव शोधा..."></div>
                <div class="filter-group"><label class="date-filter-label">पासूनची तारीख</label><input type="date" id="fromDateFilter"></div>
                <div class="filter-group"><label class="date-filter-label">पर्यंतची तारीख</label><input type="date" id="toDateFilter"></div>
                <div class="filter-group"><select id="unit-filter"><option value="">सर्व युनिट</option></select></div>
                <div class="filter-group"><select id="staff-filter"><option value="">सर्व अधिकारी</option></select></div>
                <div class="filter-group full-width"><select id="status-filter"><option value="">सर्व स्टेटस</option><option value="Pending">Pending</option><option value="Approved">Approved</option><option value="Rejected">Rejected</option></select></div>
            </div>
            <div class="applicant-list-container" id="applicant-list-container"></div>
        </aside>
        <main class="details-panel">
            <div id="welcome-message"><h2><i class="fas fa-hand-pointer fa-2x"></i></h2><p>माहिती पाहण्यासाठी डावीकडील यादीतून एका नावावर क्लिक करा.</p></div>
            <div class="details-view-card" id="details-view" style="display: none;"></div>
        </main>
    </div>
</div>

<script>

    const MARATHI_LABELS = {

        branchName: "शाखेचे नाव", centerName: "केंद्राचे नाव/कोड", loanAmountRequested: "मागितलेली रक्कम", loanPurpose: "कर्जाचा उद्देश", loanProductType: "कर्ज प्रकार",

        expenseEducation: "शिक्षण खर्च", expenseMedical: "वैद्यकीय खर्च", expenseExistingEMI: "चालू EMI", existingEMI: "चालू EMI", expenseOther: "इतर खर्च",

    function parseDate(dateStr) {
        if (!dateStr || typeof dateStr !== 'string') return null;
        dateStr = dateStr.trim();
        let date = null;
        if (dateStr.match(/^\d{1,2}\/\d{1,2}\/\d{4}/)) {
            const parts = dateStr.split(' '); 
            const dateParts = parts[0].split('/'); 
            if (dateParts.length === 3) {
                const day = dateParts[0].padStart(2, '0'); const month = dateParts[1].padStart(2, '0'); const year = dateParts[2];                    
                date = new Date(`${year}-${month}-${day}T${parts[1] || '00:00:00'}`);
                if (!isNaN(date.getTime())) return date; 
            }
        }
        if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
            const parts = dateStr.split('-'); date = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
            if (!isNaN(date.getTime())) return date;
        }
        date = new Date(dateStr);
        if (!isNaN(date.getTime())) return date;
        return null;
    }

    function formatTimestamp(timestamp, includeTime = false) {
        const date = parseDate(timestamp);
        if (!date) return 'तपशील उपलब्ध नाही';
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        if (includeTime) { options.hour = '2-digit'; options.minute = '2-digit'; options.hour12 = true; }
        try { return date.toLocaleString('en-IN', options).replace(/, /g, ' '); } 
        catch { return date.toLocaleDateString('en-IN'); }
    }

    const isValidUrl = (url) => /^https?:\/\/.+/.test(url);

    function parseMultiUrlString(urlString) {
        if (!urlString || typeof urlString !== 'string') return [];
        return urlString.replace(/[\n;]/g, ',').split(',').map(u => u.trim()).filter(u => u && isValidUrl(u));
    }

    function generateJitsiUrl(applicantName, rowId) {
        const safeName = (applicantName || 'Applicant').trim().replace(/[^a-zA-Z0-9]/g, '_').substring(0, 20);
        return JITSI_BASE_URL + encodeURIComponent(`AnikVeri_${safeName}_${rowId}`);
    }
    
    window.copyJitsiLink = function() {
        const linkDisplayElement = document.getElementById('jitsi-link-content');
        if (!linkDisplayElement) return;
        const tempInput = document.createElement('textarea');
        tempInput.value = `व्हिडिओ कॉल लिंक: ${linkDisplayElement.innerText.trim()}`; 
        document.body.appendChild(tempInput); tempInput.select(); document.execCommand('copy'); document.body.removeChild(tempInput);
        alert('✅ व्हिडिओ कॉल लिंक कॉपी केली आहे!');
    }

            window.open(jitsiUrl, '_blank');
        }

    window.addEventListener('load', fetchData);

    async function fetchData() {
        try {
            ui.pageLoader.classList.remove('hidden');
            const response = await fetch(`${SCRIPT_URL}?action=getData&role=verifier`);
            const result = await response.json();
            if (result.status === 'success') {
                allApplicants = result.data.sort((a, b) => {
                    const dateA = parseDate(a.actualTime || a.timestamp); const dateB = parseDate(b.actualTime || b.timestamp);
                    return (dateB ? dateB.getTime() : 0) - (dateA ? dateA.getTime() : 0);
                });
                populateUnitFilter(allApplicants); populateStaffFilter(allApplicants); filterAndRender();
                if (!window.listenersAdded) { addEventListeners(); window.listenersAdded = true; }
            } else { throw new Error(result.message); }
        } catch (error) { 
            ui.applicantListContainer.innerHTML = `<p style="padding:20px; color:red;">डेटा लोड करताना त्रुटी: ${error.message}</p>`; 
        } finally { 
            ui.pageLoader.classList.add('hidden');
        }
    }

            });
        });
    }

    function populateUnitFilter(applicants) {
        const unitNames = [...new Set(applicants.map(app => app.Unit).filter(Boolean))].sort();
        ui.unitFilter.innerHTML = '<option value="">सर्व युनिट</option>' + unitNames.map(name => `<option value="${name}">${name}</option>`).join('');
    }

    function populateStaffFilter(applicants) {
        const staffNames = [...new Set(applicants.map(app => app.fieldOfficerName).filter(Boolean))].sort();
        ui.staffFilter.innerHTML = '<option value="">सर्व अधिकारी</option>' + staffNames.map(name => `<option value="${name}">${name}</option>`).join('');
    }

    function filterAndRender() {
        const searchTerm = ui.searchBox.value.toLowerCase();
        const unit = ui.unitFilter.value; const staffName = ui.staffFilter.value; const status = ui.statusFilter.value;
        const fDate = ui.fromDateFilter.value ? parseDate(ui.fromDateFilter.value) : null; if(fDate) fDate.setHours(0,0,0,0);
        const tDate = ui.toDateFilter.value ? parseDate(ui.toDateFilter.value) : null; if(tDate) tDate.setHours(23,59,59,999);

        const filtered = allApplicants.filter(app => {
            const appDate = parseDate(app.actualTime || app.timestamp); 
            const passesBasic = (app.customerName?.toLowerCase().includes(searchTerm) || app.villageName?.toLowerCase().includes(searchTerm)) && 
                                (!unit || app.Unit === unit) && (!staffName || app.fieldOfficerName === staffName) && 
                                (!status || (app.VerificationStatus || 'Pending') === status);
            if (!passesBasic) return false;
            if (fDate || tDate) {
                if (!appDate) return false;
                if (fDate && appDate.getTime() < fDate.getTime()) return false;
                if (tDate && appDate.getTime() > tDate.getTime()) return false;
            }
            return true;
        });
        
        updateKpis(filtered); renderApplicantList(filtered);
    }

        ui.detailsView.querySelector('#media-docs').innerHTML = docs.length ? docs.map((u,i) => `<a class="photo-link-item" href="${u}" target="_blank"><div class="photo-placeholder"><i class="fas fa-file-alt"></i><span>कागदपत्र ${i+1}</span></div></a>`).join('') : '<p>कागदपत्रे नाहीत.</p>';

        if (app.gpsLatitude && app.gpsLongitude) {
            ui.detailsView.querySelector('#media-map').innerHTML = `<a href="https://www.google.com/maps?q=${app.gpsLatitude},${app.gpsLongitude}" target="_blank"><img src="https://static-maps.yandex.ru/1.x/?ll=${app.gpsLongitude},${app.gpsLatitude}&z=16&l=sat,skl&size=450,250&pt=${app.gpsLongitude},${app.gpsLatitude},pm2rdl"></a>`;
        } else { ui.detailsView.querySelector('#media-map').innerHTML = '<p>लोकेशन उपलब्ध नाही.</p>'; }

        // Form logic
        const form = ui.detailsView.querySelector('#verification-form');
        form.elements.isInfoCorrect.value = app.IsInfoCorrect || ''; 
        form.elements.isVideoCallDone.value = app.IsVideoCallDone || '';
        form.elements.cast.value = app.cast || ''; 
        form.elements.verificationStatus.value = app.VerificationStatus || 'Pending'; 
        form.elements.verifierRemarks.value = app.VerifierRemarks || '';
        form.elements.verifierName.value = app.VerifierName || ''; 
        form.elements.approvedLoanAmount.value = app.ApprovedLoanAmount || app.loanAmountRequested || '';
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const btn = form.querySelector('#update-btn'); const statusEl = form.querySelector('#update-status');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> सेव्ह होत आहे...'; btn.disabled = true;
            try {
                const formData = new FormData(form);
                const data = { action: 'updateVerification', row: currentApplicant.row };
                for (let [k, v] of formData.entries()) data[k] = v;
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await res.json();
                if (result.status === 'success') {
                    statusEl.style.color = 'green'; statusEl.textContent = '✅ माहिती सेव्ह झाली!';
                    setTimeout(() => fetchData(), 1500); 
                } else throw new Error(result.message);
            } catch (err) {
                statusEl.style.color = 'red'; statusEl.textContent = `त्रुटी: ${err.message}`;
                btn.innerHTML = '<i class="fas fa-save"></i> पुन्हा प्रयत्न करा'; btn.disabled = false;
            }
        });
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(tb => tb.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
